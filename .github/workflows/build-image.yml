name: Docker Image CI/CD

on:
  push:
    branches: [ "Docker" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build Docker image
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}  # Reference the secret
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: docker buildx build --platform linux/arm64 --build-arg SUPABASE_URL=$SUPABASE_URL --build-arg SUPABASE_KEY=$SUPABASE_KEY -t ${{ secrets.DOCKER_HUB_USERNAME }}/spindriftimageci:${{ github.sha }} --push .


      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_HUB_USERNAME }}/spindriftimageci:${{ github.sha }}
