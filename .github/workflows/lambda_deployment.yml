name: Deploy Lambda Function

on:
  push:
    branches: [ feature-danger ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - name: Install zip tool
        uses: montudor/action-zip@v1
      - name: Change directory to lambda/danger/src and create Zip file for Lambda function
        run: |
          cd lambda/danger/src
          zip -r ../../../../code.zip .
      - name: AWS CLI v2
        uses: imehedi/actions-awscli-v2@latest
        with:
          args: "lambda update-function-code \
            --function-name arn:aws:lambda:us-east-2:509399619253:function:Func-DangerRating \
            --zip-file fileb://code.zip"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_DANGER_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_DANGER_KEY }}
          AWS_DEFAULT_REGION: "us-east-2"